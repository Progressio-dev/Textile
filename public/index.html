<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patron Textile Paramétrique — PoC SaaS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🪡 Patron Textile Paramétrique</h1>
      <p class="subtitle">Prototype SaaS — Manipulation vectorielle en temps réel</p>
    </header>

    <main>
      <!-- Zone de dessin Paper.js -->
      <div id="canvas-wrapper">
        <canvas id="patronCanvas" width="680" height="460"></canvas>
      </div>

      <!-- Panneau de contrôle -->
      <aside id="controls">
        <h2>Mesures du patron</h2>
        <p class="patron-name" id="patron-name">Chargement…</p>

        <section class="panel-section">
          <h3>Import vectoriel (DXF / PDF)</h3>
          <input type="file" id="vector-import-input" accept=".dxf,.pdf,application/pdf,application/dxf,image/vnd.dxf" />
          <p class="hint" id="vector-import-status">Aucun fichier importé.</p>
        </section>

        <section class="panel-section" id="zone-editor">
          <h3>Zones de mesure</h3>
          <label for="zone-measure-type">Type de mesure</label>
          <select id="zone-measure-type"></select>
          <label for="zone-name">Nom de zone</label>
          <input id="zone-name" type="text" placeholder="Ex: Tour de taille" />
          <button type="button" id="create-zone-btn">Créer la zone</button>

          <div class="segment-editor">
            <label for="zone-select">Zone</label>
            <select id="zone-select"></select>
            <label for="segment-start">Départ</label>
            <select id="segment-start"></select>
            <label for="segment-end">Arrivée</label>
            <select id="segment-end"></select>
            <button type="button" id="add-segment-btn">Ajouter segment orienté</button>
          </div>

          <ul id="zone-details"></ul>
        </section>

        <!-- Les sliders sont générés dynamiquement par app.js -->
        <div id="mesures-list"></div>

        <div id="info-section">
          <h3>Coordonnées (px)</h3>
          <ul id="points-info"></ul>
        </div>
      </aside>
    </main>
  </div>

  <!-- Paper.js servi localement depuis node_modules (pas de dépendance CDN) -->
  <script src="/vendor/paper-full.min.js"></script>
  <!-- Logique applicative -->
  <script src="app.js"></script>
</body>
</html>
